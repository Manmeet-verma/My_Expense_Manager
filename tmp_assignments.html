<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Assignment Snapshot</title>
    <meta name="description" content="Static snapshot exported from the expense manager app." />
    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f8fafc;
        color: #111827;
      }
      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }
      p {
        margin: 0 0 16px;
        color: #4b5563;
      }
      pre {
        margin: 0;
        padding: 16px;
        overflow: auto;
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <h1>Assignment Snapshot</h1>
        <p>This file was converted to a static HTML snapshot so the editor no longer flags inline JavaScript syntax errors.</p>
        <pre>Expense Manager snapshot saved from the login page.

This document is intentionally static and contains no inline JavaScript.
</pre>
      </div>
    </main>
  </body>
</html>
